<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Animación Interactiva | Counting Sort</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7918A1;
            --bg: #ffffff;
            --text: #000000;
        }

        body {
            font-family: 'Fira Code', monospace;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            text-transform: uppercase;
            border-bottom: 4px solid var(--primary);
            padding-bottom: 5px;
            margin-bottom: 30px;
        }

        /* Arreglos */
        .array-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            min-height: 60px;
            margin-bottom: 40px;
            padding: 20px;
            border: 2px solid black;
            background: #f8f8f8;
            width: 90%;
        }

        .element {
            width: 45px;
            height: 45px;
            border: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            background: white;
            transition: all 0.3s ease;
        }

        .element.active {
            background: var(--primary);
            color: white;
            transform: scale(1.2);
        }

        .element.sorted {
            background: #e0e0e0;
        }

        /* GRID DE CUBETAS (SIN SCROLL) */
        .buckets-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
            gap: 8px;
            width: 95%;
            padding: 20px;
            margin-bottom: 40px;
            border: 2px solid black;
        }

        .bucket {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bucket-box {
            width: 35px;
            height: 35px;
            border: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            background: white;
            font-weight: 800;
        }

        .bucket-box.highlight {
            background: var(--primary);
            color: white;
        }

        .bucket-label {
            font-size: 0.6rem;
            margin-top: 5px;
            font-weight: bold;
            color: var(--primary);
        }

        /* Controles */
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        button {
            padding: 10px 20px;
            font-family: 'Fira Code', monospace;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            background: black;
            color: white;
            border: none;
        }

        button:hover {
            background: var(--primary);
        }

        #status-text {
            font-weight: bold;
            color: var(--primary);
        }

        .label-tag {
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 10px;
            align-self: flex-start;
            margin-left: 5%;
        }
    </style>
</head>
<body>

    <h2>Visualización paso a paso: Counting Sort</h2>

    <div class="controls">
        <button id="startBtn">Iniciar Animación</button>
        <button onclick="window.location.reload()">Reiniciar</button>
        <span id="status-text">Listo para comenzar</span>
        <label style="font-size:0.8rem;">Velocidad:</label>
        <input type="range" id="speedSlider" min="50" max="1000" step="50" value="500">
        <span id="speedValue">500 ms</span>
    </div>

    <div class="label-tag">ARREGLO ORIGINAL:</div>
    <div id="input-array" class="array-container"></div>

    <div class="label-tag">CUBETAS DE CONTEO:</div>
    <div id="buckets-container" class="buckets-wrapper"></div>

    <div class="label-tag">ARREGLO ORDENADO:</div>
    <div id="output-array" class="array-container"></div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const dataRaw = urlParams.get('arr');
    let array = dataRaw ? JSON.parse(decodeURIComponent(dataRaw)) : [5, 2, 8, 2, 1, 0];

    const maxVal = Math.max(...array);

    const inputContainer = document.getElementById('input-array');
    const bucketsContainer = document.getElementById('buckets-container');
    const outputContainer = document.getElementById('output-array');
    const statusText = document.getElementById('status-text');
    const startBtn = document.getElementById('startBtn');

    function init() {
        // Arreglo original
        array.forEach((val, i) => {
            const div = document.createElement('div');
            div.className = 'element';
            div.textContent = val;
            div.id = `input-${i}`;
            inputContainer.appendChild(div);
        });

        // Cubetas DESDE 0
        for (let i = 0; i <= maxVal; i++) {
            const bucket = document.createElement('div');
            bucket.className = 'bucket';
            bucket.innerHTML = `
                <div class="bucket-box" id="bucket-${i}">0</div>
                <div class="bucket-label">${i}</div>
            `;
            bucketsContainer.appendChild(bucket);
        }
    }

    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    async function startAnimation() {
        startBtn.disabled = true;
        const counts = new Array(maxVal + 1).fill(0);

        // FASE 1: CONTEO
        statusText.textContent = "Fase 1: Contando...";
        for (let i = 0; i < array.length; i++) {
            const val = array[i];
            const el = document.getElementById(`input-${i}`);
            const bucket = document.getElementById(`bucket-${val}`);

            el.classList.add('active');
            await sleep(500);

            counts[val]++;
            bucket.textContent = counts[val];
            bucket.classList.add('highlight');

            await sleep(500);
            el.classList.remove('active');
            el.classList.add('sorted');
            bucket.classList.remove('highlight');
        }

        await sleep(800);

        // FASE 2: RECONSTRUCCIÓN
        statusText.textContent = "Fase 2: Reconstruyendo...";
        for (let i = 0; i <= maxVal; i++) {
            const bucket = document.getElementById(`bucket-${i}`);

            while (counts[i] > 0) {
                bucket.classList.add('highlight');

                const outEl = document.createElement('div');
                outEl.className = 'element active';
                outEl.textContent = i;
                outputContainer.appendChild(outEl);

                await sleep(400);
                outEl.classList.remove('active');

                counts[i]--;
                bucket.textContent = counts[i];

                await sleep(300);
            }

            bucket.classList.remove('highlight');
        }

        statusText.textContent = "¡Ordenamiento completado!";
    }

    startBtn.addEventListener('click', startAnimation);
    init();
</script>

</body>
</html>

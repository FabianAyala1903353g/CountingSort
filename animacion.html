<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Animación Interactiva | Counting Sort</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7918A1;
            --bg: #ffffff;
            --text: #000000;
        }

        body {
            font-family: 'Fira Code', monospace;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            text-transform: uppercase;
            border-bottom: 4px solid var(--primary);
            padding-bottom: 5px;
            margin-bottom: 30px;
        }

        .array-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            min-height: 60px;
            margin-bottom: 40px;
            padding: 20px;
            border: 2px solid black;
            background: #f8f8f8;
            width: 90%;
        }

        .element {
            width: 45px;
            height: 45px;
            border: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            background: white;
            transition: all 0.3s ease;
        }

        .element.active {
            background: var(--primary);
            color: white;
            transform: scale(1.2);
        }

        .element.sorted {
            background: #e0e0e0;
        }

        .contadors-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
            gap: 8px;
            width: 95%;
            padding: 20px;
            margin-bottom: 40px;
            border: 2px solid black;
        }

        .contador {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .contador-box {
            width: 35px;
            height: 35px;
            border: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            background: white;
            font-weight: 800;
        }

        .contador-box.highlight {
            background: var(--primary);
            color: white;
        }

        .contador-label {
            font-size: 0.6rem;
            margin-top: 5px;
            font-weight: bold;
            color: var(--primary);
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            font-family: 'Fira Code', monospace;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            background: black;
            color: white;
            border: none;
        }

        button:hover {
            background: var(--primary);
        }

        #status-text {
            font-weight: bold;
            color: var(--primary);
        }

        .label-tag {
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 10px;
            align-self: flex-start;
            margin-left: 5%;
        }
    </style>
</head>
<body>

<h2>Visualización paso a paso: Counting Sort</h2>

<div class="controls">
    <button id="startBtn">Iniciar</button>
    <button id="pauseBtn">Pausar</button>
    <button onclick="window.location.reload()">Reiniciar</button>

    <label>Velocidad:</label>
    <input type="range" id="speedSlider" min="50" max="1000" step="50" value="500">
    <span id="speedValue">500 ms</span>

    <span id="status-text">Listo</span>
</div>

<div class="label-tag">ARREGLO ORIGINAL:</div>
<div id="input-array" class="array-container"></div>

<div class="label-tag">CONTADOR:</div>
<div id="contadors-container" class="contadors-wrapper"></div>

<div class="label-tag">ARREGLO ORDENADO:</div>
<div id="output-array" class="array-container"></div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const dataRaw = urlParams.get('arr');
let array = dataRaw ? JSON.parse(decodeURIComponent(dataRaw)) : [5,2,8,2,1,0];

const maxVal = Math.max(...array);

const inputContainer = document.getElementById('input-array');
const contadorsContainer = document.getElementById('contadors-container');
const outputContainer = document.getElementById('output-array');

const startBtn = document.getElementById('startBtn');
const pauseBtn = document.getElementById('pauseBtn');
const statusText = document.getElementById('status-text');

const speedSlider = document.getElementById('speedSlider');
const speedValue = document.getElementById('speedValue');

let speed = parseInt(speedSlider.value);
let paused = false;

// velocidad dinámica
speedSlider.addEventListener('input', () => {
    let raw = parseInt(speedSlider.value);
speed = 1050 - raw; // invierte

speedValue.textContent = "Velocidad: " + (raw / 10).toFixed(0) + "%";
});

// pausa
pauseBtn.addEventListener('click', () => {
    paused = !paused;
    pauseBtn.textContent = paused ? "Continuar" : "Pausar";
});

// sleep inteligente
const sleep = () => new Promise(resolve => {
    const check = () => {
        if (!paused) {
            setTimeout(resolve, speed);
        } else {
            setTimeout(check, 100);
        }
    };
    check();
});

function init() {
    array.forEach((val, i) => {
        const div = document.createElement('div');
        div.className = 'element';
        div.textContent = val;
        div.id = `input-${i}`;
        inputContainer.appendChild(div);
    });

    for (let i = 0; i <= maxVal; i++) {
        const c = document.createElement('div');
        c.className = 'contador';
        c.innerHTML = `
            <div class="contador-box" id="contador-${i}">0</div>
            <div class="contador-label">${i}</div>
        `;
        contadorsContainer.appendChild(c);
    }
}

async function startAnimation() {
    startBtn.disabled = true;
    const counts = new Array(maxVal + 1).fill(0);

    statusText.textContent = "Contando...";
    for (let i = 0; i < array.length; i++) {
        const val = array[i];
        const el = document.getElementById(`input-${i}`);
        const contador = document.getElementById(`contador-${val}`);

        el.classList.add('active');
        await sleep();

        counts[val]++;
        contador.textContent = counts[val];
        contador.classList.add('highlight');

        await sleep();
        el.classList.remove('active');
        el.classList.add('sorted');
        contador.classList.remove('highlight');
    }

    statusText.textContent = "Reconstruyendo...";
    for (let i = 0; i <= maxVal; i++) {
        const contador = document.getElementById(`contador-${i}`);

        while (counts[i] > 0) {
            contador.classList.add('highlight');

            const out = document.createElement('div');
            out.className = 'element active';
            out.textContent = i;
            outputContainer.appendChild(out);

            await sleep();
            out.classList.remove('active');

            counts[i]--;
            contador.textContent = counts[i];

            await sleep();
        }

        contador.classList.remove('highlight');
    }

    statusText.textContent = "¡Completado!";
}

startBtn.addEventListener('click', startAnimation);
init();
</script>

</body>
</html>

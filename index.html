<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Counting Sort Dinámico | 0-200</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: white;
            font-family: 'Fira Code', 'JetBrains Mono', 'Courier New', monospace;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #7918A1;
            padding: 1rem 2rem;
            border-bottom: 3px solid black;
            flex-shrink: 0;
        }

        .header h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
        }

        .header p {
            color: #f0e6f5;
            margin-top: 0.3rem;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: white;
        }

        .control-panel {
            background: white;
            border-bottom: 2px solid black;
            padding: 1rem 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: white;
        }

        .control-group label {
            font-size: 0.7rem;
            font-weight: 700;
            color: black;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
        }

        input, button {
            border: 2px solid black;
            background: white;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            padding: 0.4rem 0.8rem;
            transition: all 0.1s ease;
            outline: none;
            color: black;
            font-weight: 700;
            border-radius: 0px;
        }

        input:focus {
            border-color: #7918A1;
            background: #faf5ff;
        }

        button {
            background: black;
            color: white;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 2px solid black;
        }

        button:hover {
            background: #7918A1;
            border-color: #7918A1;
            color: white;
        }

        .btn-outline {
            background: white;
            color: black;
            border: 2px solid black;
        }

        .btn-outline:hover {
            background: #7918A1;
            color: white;
            border-color: #7918A1;
        }

        .array-section {
            background: white;
            padding: 1rem 2rem;
            border-bottom: 1px solid #e0e0e0;
            flex-shrink: 0;
        }

        .array-title {
            font-weight: 800;
            font-size: 0.8rem;
            margin-bottom: 0.8rem;
            color: black;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-left: 4px solid #7918A1;
            padding-left: 12px;
        }

        .inputs-wrapper {
            max-height: 240px;
            overflow-y: auto;
            background: #fefefe;
            border: 1px solid black;
            padding: 0.8rem;
        }

        .inputs-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .input-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: white;
            border: 1px solid black;
            padding: 4px 8px 4px 10px;
        }

        .input-item span {
            font-weight: 800;
            font-size: 0.8rem;
            color: #7918A1;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            min-width: 28px;
        }

        .input-item input {
            width: 80px;
            padding: 0.4rem 0.4rem;
            font-size: 0.9rem;
            border: 1px solid black;
            text-align: center;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            font-weight: 800;
            color: black;
        }

        .result-section {
            flex: 1;
            padding: 1rem 2rem;
            background: white;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .result-box {
            background: #f8f8f8;
            border: 2px solid black;
            padding: 1rem;
            width: 100%;
        }

        .result-header {
            font-weight: 800;
            font-size: 0.85rem;
            margin-bottom: 0.6rem;
            color: black;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            text-transform: uppercase;
            border-bottom: 2px solid #7918A1;
            display: inline-block;
            padding-bottom: 4px;
        }

        .sorted-content {
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            background: white;
            border: 1px solid #ccc;
            padding: 0.8rem;
            word-break: break-word;
            white-space: pre-wrap;
            line-height: 1.5;
            color: black;
            font-weight: 700;
        }

        .error-message {
            background: black;
            color: white;
            padding: 0.6rem;
            margin-top: 0.6rem;
            font-family: 'Fira Code', monospace;
            border-left: 5px solid #7918A1;
            font-weight: 600;
            font-size: 0.8rem;
            display: none;
        }

        .info-stats {
            margin-top: 0.6rem;
            font-size: 0.7rem;
            font-family: 'Fira Code', monospace;
            color: #444;
            border-top: 1px solid #ddd;
            padding-top: 0.5rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="header">
    <h1>COUNTING SORT DINÁMICO</h1>
    <p>Rango: 0 a 200 | Cubetas dinámicas hasta el valor máximo</p>
</div>

<div class="main-content">
    <div class="control-panel">
        <div class="control-group">
            <label>CANTIDAD DE ELEMENTOS</label>
            <input type="number" id="arraySizeInput" min="1" max="100" value="10">
        </div>
        <div class="control-group">
            <label>&nbsp;</label>
            <button id="createArrayBtn">GENERAR ARREGLO</button>
        </div>
        <div class="control-group">
            <label>&nbsp;</label>
            <button id="randomizeBtn" class="btn-outline">VALORES ALEATORIOS</button>
        </div>
        <div class="control-group">
            <label>&nbsp;</label>
            <button id="sortBtn">ORDENAR</button>
        </div>
    </div>

    <div class="array-section">
        <div class="array-title">ARREGLO DE ENTEROS (0 a 200)</div>
        <div class="inputs-wrapper">
            <div id="inputsContainer" class="inputs-grid"></div>
        </div>
    </div>

    <div class="result-section">
        <div class="result-box">
            <div class="result-header">RESULTADO DEL ORDENAMIENTO</div>
            <div id="sortedDisplay" class="sorted-content">[ sin datos ]</div>
            <div id="errorMsg" class="error-message"></div>
            <div id="infoStats" class="info-stats">Esperando generación...</div>
        </div>
        
        <div id="animationButtonContainer" style="margin-top: 1rem; display: none;">
            <button id="showAnimationBtn" class="btn-outline">MOSTRAR ANIMACIÓN</button>
        </div>
    </div>
</div>

<script>
    function algoritmoCountingSort(arregloEntrada) {
        if (arregloEntrada.length === 0) return { ordenado: [], max: 0 };
        
        let valorMaximo = 0;
        for (let x of arregloEntrada) {
            if (x > valorMaximo) valorMaximo = x;
        }

        let arregloConteo = new Array(valorMaximo + 1).fill(0);
        
        for (let i = 0; i < arregloEntrada.length; i++) {
            arregloConteo[arregloEntrada[i]]++;
        }
        
        let resultadoOrdenado = [];
        for (let valor = 0; valor <= valorMaximo; valor++) {
            while (arregloConteo[valor] > 0) {
                resultadoOrdenado.push(valor);
                arregloConteo[valor]--;
            }
        }
        return { ordenado: resultadoOrdenado, max: valorMaximo };
    }
    
    function obtenerNumerosAleatorios(cantidad, valorMin, valorMax) {
        const numeros = [];
        for (let i = 0; i < cantidad; i++) {
            numeros.push(Math.floor(Math.random() * (valorMax - valorMin + 1)) + valorMin);
        }
        return numeros;
    }
    
    const inputTamano = document.getElementById('arraySizeInput');
    const botonCrear = document.getElementById('createArrayBtn');
    const botonAleatorio = document.getElementById('randomizeBtn');
    const botonOrdenar = document.getElementById('sortBtn');
    const botonAnimacion = document.getElementById('showAnimationBtn');
    const contenedorEntradas = document.getElementById('inputsContainer');
    const visualizacionOrdenada = document.getElementById('sortedDisplay');
    const divMensajeError = document.getElementById('errorMsg');
    const estadisticasInfo = document.getElementById('infoStats');
    
    function generarCamposEntrada(tamano) {
        const tamanoFinal = Math.min(tamano, 100);
        const numeros = obtenerNumerosAleatorios(tamanoFinal, 0, 200);
        
        contenedorEntradas.innerHTML = '';
        for (let i = 0; i < tamanoFinal; i++) {
            const envoltorio = document.createElement('div');
            envoltorio.className = 'input-item';
            envoltorio.innerHTML = `<span>${i+1}</span><input type="number" value="${numeros[i]}" min="0" max="200" class="array-elem-input">`;
            contenedorEntradas.appendChild(envoltorio);
        }
        
        visualizacionOrdenada.innerHTML = "[ sin ordenar ]";
        document.getElementById('animationButtonContainer').style.display = 'none';
        divMensajeError.style.display = 'none';
    }
    
    botonCrear.onclick = () => generarCamposEntrada(parseInt(inputTamano.value));
    botonAleatorio.onclick = () => generarCamposEntrada(parseInt(inputTamano.value));
    
    botonOrdenar.onclick = () => {
        const elementosInput = document.querySelectorAll('.array-elem-input');
        const valores = [];
        for (let inp of elementosInput) {
            let num = parseInt(inp.value);
            if (isNaN(num) || num < 0 || num > 200) {
                divMensajeError.textContent = "Error: El valor debe estar entre 0 y 200.";
                divMensajeError.style.display = 'block';
                return;
            }
            valores.push(num);
        }
        
        divMensajeError.style.display = 'none';
        const resObj = algoritmoCountingSort(valores);
        visualizacionOrdenada.innerHTML = `ORIGINAL: [ ${valores.join(", ")} ]<br>ORDENADO: [ ${resObj.ordenado.join(", ")} ]`;
        estadisticasInfo.innerHTML = `Valor Máximo Detectado: ${resObj.max} | Cubetas creadas: ${resObj.max + 1}`;
        document.getElementById('animationButtonContainer').style.display = 'block';
    };

    botonAnimacion.onclick = () => {
        const elementosInput = document.querySelectorAll('.array-elem-input');
        const valores = Array.from(elementosInput).map(i => parseInt(i.value));
        window.open(`https://fabianayala1903353g.github.io/CountingSort/animacion.html?arr=${encodeURIComponent(JSON.stringify(valores))}`, '_blank');
    };

    generarCamposEntrada(10);
</script>
</body>
</html>

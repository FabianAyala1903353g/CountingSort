<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Counting Sort | Algoritmo de ordenamiento</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: white;
            font-family: 'Fira Code', 'JetBrains Mono', 'Courier New', monospace;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #7918A1;
            padding: 1rem 2rem;
            border-bottom: 3px solid black;
            flex-shrink: 0;
        }

        .header h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
        }

        .header p {
            color: #f0e6f5;
            margin-top: 0.3rem;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: white;
        }

        .control-panel {
            background: white;
            border-bottom: 2px solid black;
            padding: 1rem 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: white;
        }

        .control-group label {
            font-size: 0.7rem;
            font-weight: 700;
            color: black;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
        }

        input, button {
            border: 2px solid black;
            background: white;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            padding: 0.4rem 0.8rem;
            transition: all 0.1s ease;
            outline: none;
            color: black;
            font-weight: 700;
            border-radius: 0px;
        }

        input:focus {
            border-color: #7918A1;
            background: #faf5ff;
        }

        button {
            background: black;
            color: white;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 2px solid black;
        }

        button:hover {
            background: #7918A1;
            border-color: #7918A1;
            color: white;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-outline {
            background: white;
            color: black;
            border: 2px solid black;
        }

        .btn-outline:hover {
            background: #7918A1;
            color: white;
            border-color: #7918A1;
        }

        .array-section {
            background: white;
            padding: 1rem 2rem;
            border-bottom: 1px solid #e0e0e0;
            flex-shrink: 0;
        }

        .array-title {
            font-weight: 800;
            font-size: 0.8rem;
            margin-bottom: 0.8rem;
            color: black;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-left: 4px solid #7918A1;
            padding-left: 12px;
        }

        .inputs-wrapper {
            max-height: 240px;
            overflow-y: auto;
            background: #fefefe;
            border: 1px solid black;
            padding: 0.8rem;
        }

        .inputs-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .input-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: white;
            border: 1px solid black;
            padding: 4px 8px 4px 10px;
        }

        .input-item span {
            font-weight: 800;
            font-size: 0.8rem;
            color: #7918A1;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            min-width: 28px;
        }

        .input-item input {
            width: 80px;
            padding: 0.4rem 0.4rem;
            font-size: 0.9rem;
            border: 1px solid black;
            text-align: center;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            font-weight: 800;
            color: black;
        }

        .result-section {
            flex: 1;
            padding: 1rem 2rem;
            background: white;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .result-box {
            background: #f8f8f8;
            border: 2px solid black;
            padding: 1rem;
            width: 100%;
        }

        .result-header {
            font-weight: 800;
            font-size: 0.85rem;
            margin-bottom: 0.6rem;
            color: black;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            text-transform: uppercase;
            border-bottom: 2px solid #7918A1;
            display: inline-block;
            padding-bottom: 4px;
        }

        .sorted-content {
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            background: white;
            border: 1px solid #ccc;
            padding: 0.8rem;
            word-break: break-word;
            white-space: pre-wrap;
            line-height: 1.5;
            color: black;
            font-weight: 700;
        }

        .error-message {
            background: black;
            color: white;
            padding: 0.6rem;
            margin-top: 0.6rem;
            font-family: 'Fira Code', monospace;
            border-left: 5px solid #7918A1;
            font-weight: 600;
            font-size: 0.8rem;
            display: none;
        }

        .info-stats {
            margin-top: 0.6rem;
            font-size: 0.7rem;
            font-family: 'Fira Code', monospace;
            color: #444;
            border-top: 1px solid #ddd;
            padding-top: 0.5rem;
            font-weight: 600;
        }

        .inputs-wrapper::-webkit-scrollbar {
            width: 6px;
        }
        .inputs-wrapper::-webkit-scrollbar-track {
            background: #f0f0f0;
        }
        .inputs-wrapper::-webkit-scrollbar-thumb {
            background: #7918A1;
        }

        .initial-message {
            text-align: center;
            padding: 1.5rem;
            color: #666;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            border: 1px dashed black;
            background: #fafafa;
            width: 100%;
            font-weight: 600;
        }

        .bottom-button {
            margin-top: 1rem;
            display: flex;
            justify-content: flex-start;
        }
    </style>
</head>
<body>
<div class="header">
    <h1>COUNTING SORT ALGORITHM</h1>
    <p>Ordenamiento lineal por conteo | Enteros positivos (1 a 500) | Permite repeticiones</p>
</div>

<div class="main-content">
    <div class="control-panel">
        <div class="control-group">
            <label>CANTIDAD DE ELEMENTOS</label>
            <input type="number" id="arraySizeInput" min="1" max="100" value="10" step="1">
        </div>
        <div class="control-group">
            <label>&nbsp;</label>
            <button id="createArrayBtn">GENERAR ARREGLO</button>
        </div>
        <div class="control-group">
            <label>&nbsp;</label>
            <button id="randomizeBtn" class="btn-outline">VALORES ALEATORIOS</button>
        </div>
        <div class="control-group">
            <label>&nbsp;</label>
            <button id="sortBtn">ORDENAR</button>
        </div>
    </div>

    <div class="array-section">
        <div class="array-title">ARREGLO DE ENTEROS (1 a 500) - CON REPETICIONES PERMITIDAS</div>
        <div class="inputs-wrapper">
            <div id="inputsContainer" class="inputs-grid">
                <div class="initial-message">Configure la cantidad y presione "GENERAR ARREGLO"</div>
            </div>
        </div>
    </div>

    <div class="result-section">
        <div class="result-box">
            <div class="result-header">RESULTADO DEL ORDENAMIENTO</div>
            <div id="sortedDisplay" class="sorted-content">[ sin datos ]</div>
            <div id="errorMsg" class="error-message"></div>
            <div id="infoStats" class="info-stats">Esperando generacion del arreglo...</div>
        </div>
        
        <div id="animationButtonContainer" class="bottom-button" style="display: none;">
            <button id="showAnimationBtn" class="btn-outline">MOSTRAR ANIMACION</button>
        </div>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // ALGORITMO COUNTING SORT (SOPORTA REPETICIONES)
    // --------------------------------------------------------------
    function algoritmoCountingSort(arregloEntrada) {
        if (!Array.isArray(arregloEntrada)) throw new Error("El arreglo no es valido");
        if (arregloEntrada.length === 0) return [];
        
        for (let i = 0; i < arregloEntrada.length; i++) {
            if (!Number.isInteger(arregloEntrada[i])) {
                throw new Error(`Elemento '${arregloEntrada[i]}' no es un entero.`);
            }
            if (arregloEntrada[i] < 1) {
                throw new Error(`Counting Sort requiere valores >= 1. Valor invalido: ${arregloEntrada[i]}`);
            }
            if (arregloEntrada[i] > 500) {
                throw new Error(`Valor maximo permitido es 500. Valor encontrado: ${arregloEntrada[i]}`);
            }
        }
        
        let valorMaximo = Math.max(...arregloEntrada);
        let arregloConteo = new Array(valorMaximo + 1).fill(0);
        
        // Fase de Conteo: Se incrementa el contador por cada ocurrencia
        for (let i = 0; i < arregloEntrada.length; i++) {
            arregloConteo[arregloEntrada[i]]++;
        }
        
        // Fase de Reconstruccion: Se extraen los valores segun su frecuencia
        let resultadoOrdenado = [];
        for (let valor = 1; valor <= valorMaximo; valor++) {
            while (arregloConteo[valor] > 0) {
                resultadoOrdenado.push(valor);
                arregloConteo[valor]--;
            }
        }
        return resultadoOrdenado;
    }
    
    // --------------------------------------------------------------
    // GENERAR NUMEROS ALEATORIOS (CON REPETICIONES)
    // --------------------------------------------------------------
    function obtenerNumerosAleatorios(cantidad, valorMin, valorMax) {
        const numeros = [];
        for (let i = 0; i < cantidad; i++) {
            const num = Math.floor(Math.random() * (valorMax - valorMin + 1)) + valorMin;
            numeros.push(num);
        }
        return numeros;
    }
    
    // --------------------------------------------------------------
    // ELEMENTOS DEL DOM
    // --------------------------------------------------------------
    const inputTamano = document.getElementById('arraySizeInput');
    const botonCrear = document.getElementById('createArrayBtn');
    const botonAleatorio = document.getElementById('randomizeBtn');
    const botonOrdenar = document.getElementById('sortBtn');
    const botonAnimacion = document.getElementById('showAnimationBtn');
    const contenedorBotonAnimacion = document.getElementById('animationButtonContainer');
    const contenedorEntradas = document.getElementById('inputsContainer');
    const visualizacionOrdenada = document.getElementById('sortedDisplay');
    const divMensajeError = document.getElementById('errorMsg');
    const estadisticasInfo = document.getElementById('infoStats');
    
    function ocultarError() {
        divMensajeError.style.display = 'none';
        divMensajeError.textContent = '';
    }
    
    function mostrarError(mensaje) {
        divMensajeError.textContent = mensaje;
        divMensajeError.style.display = 'block';
        setTimeout(() => {
            if (divMensajeError.textContent === mensaje) {
                divMensajeError.style.display = 'none';
            }
        }, 4000);
    }
    
    function obtenerArregloActualDeInputs() {
        const elementosInput = document.querySelectorAll('.array-elem-input');
        if (elementosInput.length === 0) {
            return { error: true, mensaje: "No hay campos. Presione 'GENERAR ARREGLO' primero." };
        }
        
        const valores = [];
        for (let inp of elementosInput) {
            let crudo = inp.value.trim();
            if (crudo === "") {
                return { error: true, mensaje: "Existen campos vacios." };
            }
            let num = Number(crudo);
            if (isNaN(num)) {
                return { error: true, mensaje: `Valor no numerico: "${crudo}"` };
            }
            if (!Number.isInteger(num)) {
                return { error: true, mensaje: `El numero ${num} debe ser entero.` };
            }
            if (num < 1) {
                return { error: true, mensaje: `Valor invalido: ${num}. Minimo 1.` };
            }
            if (num > 500) {
                return { error: true, mensaje: `Valor ${num} excede maximo 500.` };
            }
            valores.push(num);
        }
        
        return { error: false, arreglo: valores };
    }
    
    function actualizarVisualizacionOrdenada() {
        ocultarError();
        const resultado = obtenerArregloActualDeInputs();
        if (resultado.error) {
            mostrarError(resultado.mensaje);
            visualizacionOrdenada.innerHTML = "[ error en datos ]";
            estadisticasInfo.innerHTML = "Corrija los valores.";
            contenedorBotonAnimacion.style.display = 'none';
            return;
        }
        
        const arregloOriginal = resultado.arreglo;
        if (arregloOriginal.length === 0) {
            visualizacionOrdenada.innerHTML = "[ arreglo vacio ]";
            contenedorBotonAnimacion.style.display = 'none';
            return;
        }
        
        try {
            const arregloOrdenado = algoritmoCountingSort(arregloOriginal);
            const maxOriginal = Math.max(...arregloOriginal);
            const minOriginal = Math.min(...arregloOriginal);
            const originalStr = arregloOriginal.join(", ");
            const ordenadoStr = arregloOrdenado.join(", ");
            visualizacionOrdenada.innerHTML = `ORIGINAL: [ ${originalStr} ]<br>ORDENADO: [ ${ordenadoStr} ]`;
            const tieneRepetidos = new Set(arregloOriginal).size !== arregloOriginal.length;
            estadisticasInfo.innerHTML = `Min: ${minOriginal} | Max: ${maxOriginal} | Elementos: ${arregloOriginal.length} | Repetidos: ${tieneRepetidos ? 'SÍ' : 'NO'}`;
            
            contenedorBotonAnimacion.style.display = 'flex';
        } catch (err) {
            mostrarError(err.message);
            visualizacionOrdenada.innerHTML = "[ error en ordenamiento ]";
            contenedorBotonAnimacion.style.display = 'none';
        }
    }
    
    function generarCamposEntrada(tamano) {
        if (!tamano || tamano < 1) tamano = 1;
        const maximoPermitido = 100;
        let tamanoFinal = Math.min(tamano, maximoPermitido);
        if (tamano > maximoPermitido) {
            mostrarError(`Maximo permitido: ${maximoPermitido} elementos.`);
            inputTamano.value = maximoPermitido;
        }
        
        // Generacion con repeticiones permitidas
        const numerosAleatorios = obtenerNumerosAleatorios(tamanoFinal, 1, 500);
        
        contenedorEntradas.innerHTML = '';
        for (let i = 0; i < tamanoFinal; i++) {
            const envoltorio = document.createElement('div');
            envoltorio.className = 'input-item';
            const spanIndice = document.createElement('span');
            spanIndice.textContent = `${i+1}`;
            const elemInput = document.createElement('input');
            elemInput.type = 'number';
            elemInput.step = '1';
            elemInput.min = '1';
            elemInput.max = '500';
            elemInput.value = numerosAleatorios[i];
            elemInput.className = 'array-elem-input';
            envoltorio.appendChild(spanIndice);
            envoltorio.appendChild(elemInput);
            contenedorEntradas.appendChild(envoltorio);
        }
        
        const tieneRepetidos = new Set(numerosAleatorios).size !== numerosAleatorios.length;
        estadisticasInfo.innerHTML = `Arreglo generado: ${tamanoFinal} elementos | REPETIDOS: ${tieneRepetidos ? 'SÍ' : 'NO'}`;
        visualizacionOrdenada.innerHTML = "[ sin ordenar ]";
        contenedorBotonAnimacion.style.display = 'none';
        ocultarError();
    }
    
    function llenarConAleatorios() {
        const entradas = document.querySelectorAll('.array-elem-input');
        if (entradas.length === 0) {
            mostrarError("Primero genere el arreglo.");
            return false;
        }
        const tamano = entradas.length;
        
        const nuevosValores = obtenerNumerosAleatorios(tamano, 1, 500);
        for (let i = 0; i < entradas.length; i++) {
            entradas[i].value = nuevosValores[i];
        }
        ocultarError();
        visualizacionOrdenada.innerHTML = "[ nuevos valores asignados, presione ORDENAR ]";
        const tieneRepetidos = new Set(nuevosValores).size !== nuevosValores.length;
        estadisticasInfo.innerHTML = `Nuevos valores (posibles repetidos). Total: ${tamano} | Repetidos: ${tieneRepetidos ? 'SÍ' : 'NO'}`;
        contenedorBotonAnimacion.style.display = 'none';
        return true;
    }
    
    function redirigirAAnimacion() {
        const resultado = obtenerArregloActualDeInputs();
        if (resultado.error) {
            mostrarError(resultado.mensaje);
            return;
        }
        const arregloActual = resultado.arreglo;
        const arregloCodificado = encodeURIComponent(JSON.stringify(arregloActual));
        const urlAnimacion = `https://fabianayala1903353g.github.io/CountingSort/animacion.html?arr=${arregloCodificado}`;
        
        window.open(urlAnimacion, '_blank');
    }
    
    // Eventos
    botonCrear.addEventListener('click', () => {
        let nuevoTamano = parseInt(inputTamano.value, 10);
        if (isNaN(nuevoTamano) || nuevoTamano < 1) {
            nuevoTamano = 5;
            inputTamano.value = 5;
        }
        if (nuevoTamano > 100) {
            mostrarError("Maximo 100 elementos.");
            nuevoTamano = 100;
            inputTamano.value = 100;
        }
        generarCamposEntrada(nuevoTamano);
    });
    
    botonAleatorio.addEventListener('click', () => {
        llenarConAleatorios();
    });
    
    botonOrdenar.addEventListener('click', () => {
        const entradas = document.querySelectorAll('.array-elem-input');
        if (entradas.length === 0) {
            mostrarError("No hay arreglo generado.");
            return;
        }
        actualizarVisualizacionOrdenada();
    });
    
    botonAnimacion.addEventListener('click', () => {
        redirigirAAnimacion();
    });
    
    inputTamano.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            botonCrear.click();
        }
    });
    
    // Inicializacion
    generarCamposEntrada(10);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Counting Sort | Algoritmo de ordenamiento</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: white;
            font-family: 'Segoe UI', 'Roboto', 'Courier New', monospace;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header - sin bordes redondeados, solo rectangulos */
        .header {
            background: #7918A1;
            padding: 1.2rem 2rem;
            border-bottom: 3px solid black;
        }

        .header h1 {
            color: white;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin: 0;
            font-family: 'Courier New', monospace;
        }

        .header p {
            color: #f0e6f5;
            margin-top: 0.4rem;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Main content - full remaining space */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: white;
        }

        /* Panel de control - sin redondeos */
        .control-panel {
            background: white;
            border-bottom: 2px solid black;
            padding: 1.5rem 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: flex-end;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: white;
        }

        .control-group label {
            font-size: 0.75rem;
            font-weight: 700;
            color: black;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Courier New', monospace;
        }

        input, button {
            border: 2px solid black;
            background: white;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            padding: 0.5rem 1rem;
            transition: all 0.1s ease;
            outline: none;
            color: black;
            font-weight: 600;
            border-radius: 0px;
        }

        input:focus {
            border-color: #7918A1;
            background: #faf5ff;
        }

        button {
            background: black;
            color: white;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 2px solid black;
        }

        button:hover {
            background: #7918A1;
            border-color: #7918A1;
            color: white;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-outline {
            background: white;
            color: black;
            border: 2px solid black;
        }

        .btn-outline:hover {
            background: #7918A1;
            color: white;
            border-color: #7918A1;
        }

        /* Area de inputs del arreglo - scrollable */
        .array-section {
            background: white;
            padding: 1.2rem 2rem;
            border-bottom: 1px solid #e0e0e0;
            flex-shrink: 0;
        }

        .array-title {
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            color: black;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-left: 4px solid #7918A1;
            padding-left: 12px;
        }

        .inputs-wrapper {
            max-height: 200px;
            overflow-y: auto;
            background: #fefefe;
            border: 1px solid black;
            padding: 1rem;
        }

        .inputs-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .input-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            border: 1px solid black;
            padding: 4px 8px 4px 12px;
        }

        .input-item span {
            font-weight: 700;
            font-size: 0.75rem;
            color: #7918A1;
            font-family: monospace;
            min-width: 28px;
        }

        .input-item input {
            width: 90px;
            padding: 0.4rem 0.5rem;
            font-size: 0.85rem;
            border: 1px solid black;
            text-align: center;
        }

        /* Resultado final - ocupa espacio restante */
        .result-section {
            flex: 1;
            padding: 1.5rem 2rem;
            background: white;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .result-box {
            background: #f8f8f8;
            border: 2px solid black;
            padding: 1.2rem;
            width: 100%;
        }

        .result-header {
            font-weight: 800;
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
            color: black;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            border-bottom: 2px solid #7918A1;
            display: inline-block;
            padding-bottom: 5px;
        }

        .sorted-content {
            font-family: 'Courier New', 'Fira Code', monospace;
            font-size: 1rem;
            background: white;
            border: 1px solid #ccc;
            padding: 1rem;
            word-break: break-word;
            white-space: pre-wrap;
            line-height: 1.5;
            color: black;
            font-weight: 500;
        }

        .error-message {
            background: black;
            color: white;
            padding: 0.7rem;
            margin-top: 0.8rem;
            font-family: monospace;
            border-left: 5px solid #7918A1;
            font-weight: bold;
        }

        .info-stats {
            margin-top: 0.8rem;
            font-size: 0.7rem;
            font-family: monospace;
            color: #444;
            border-top: 1px solid #ddd;
            padding-top: 0.6rem;
        }

        /* scrollbar estilo minimal */
        .inputs-wrapper::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .inputs-wrapper::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-left: 1px solid #ccc;
        }
        .inputs-wrapper::-webkit-scrollbar-thumb {
            background: #7918A1;
            border-radius: 0px;
        }
    </style>
</head>
<body>
<div class="header">
    <h1>COUNTING SORT ALGORITHM</h1>
    <p>Ordenamiento lineal por conteo | Solo enteros no negativos</p>
</div>

<div class="main-content">
    <!-- Barra de controles superior -->
    <div class="control-panel">
        <div class="control-group">
            <label>CANTIDAD DE ELEMENTOS</label>
            <input type="number" id="arraySizeInput" min="1" max="35" value="7" step="1">
        </div>
        <div class="control-group">
            <label>&nbsp;</label>
            <button id="createArrayBtn">GENERAR CAMPOS</button>
        </div>
        <div class="control-group">
            <label>&nbsp;</label>
            <button id="randomizeBtn" class="btn-outline">VALORES ALEATORIOS</button>
        </div>
        <div class="control-group">
            <label>&nbsp;</label>
            <button id="sortBtn">ORDENAR (COUNTING SORT)</button>
        </div>
    </div>

    <!-- Area editable del arreglo -->
    <div class="array-section">
        <div class="array-title">ARREGLO DE ENTEROS (>=0)</div>
        <div class="inputs-wrapper">
            <div id="inputsContainer" class="inputs-grid">
                <span style="color: #666;">Configure el tamano y pulse 'GENERAR CAMPOS'</span>
            </div>
        </div>
    </div>

    <!-- Resultados -->
    <div class="result-section">
        <div class="result-box">
            <div class="result-header">RESULTADO DEL ORDENAMIENTO</div>
            <div id="sortedDisplay" class="sorted-content">[ sin ordenar ]</div>
            <div id="errorMsg" class="error-message" style="display: none;"></div>
            <div id="infoStats" class="info-stats">Esperando datos del arreglo...</div>
        </div>
    </div>
</div>

<script>
    // ------------------------------------------------------------------
    // IMPLEMENTACION DEL ALGORITMO COUNTING SORT (Puro, sin modificaciones)
    // ------------------------------------------------------------------
    function countingSortAlgorithm(arr) {
        if (!Array.isArray(arr)) throw new Error("El arreglo no es valido");
        if (arr.length === 0) return [];
        
        // Validacion: todos deben ser enteros no negativos
        for (let i = 0; i < arr.length; i++) {
            if (!Number.isInteger(arr[i])) {
                throw new Error(`Elemento '${arr[i]}' no es un entero.`);
            }
            if (arr[i] < 0) {
                throw new Error(`Counting Sort requiere valores >= 0. Elemento negativo: ${arr[i]}`);
            }
        }
        
        // 1) Encontrar el valor maximo
        let maxValue = arr[0];
        for (let i = 1; i < arr.length; i++) {
            if (arr[i] > maxValue) maxValue = arr[i];
        }
        
        // 2) Arreglo de frecuencias (tamanio max+1)
        let countArray = new Array(maxValue + 1).fill(0);
        
        // 3) Conteo de ocurrencias
        for (let i = 0; i < arr.length; i++) {
            countArray[arr[i]]++;
        }
        
        // 4) Reconstruir el arreglo ordenado
        let sortedResult = [];
        for (let value = 0; value <= maxValue; value++) {
            while (countArray[value] > 0) {
                sortedResult.push(value);
                countArray[value]--;
            }
        }
        return sortedResult;
    }
    
    // ------------------------------------------------------------------
    // MANEJO DEL DOM Y LAS INTERACCIONES (sin emojis, sin redondeos)
    // ------------------------------------------------------------------
    const sizeInput = document.getElementById('arraySizeInput');
    const createBtn = document.getElementById('createArrayBtn');
    const randomizeBtn = document.getElementById('randomizeBtn');
    const sortBtn = document.getElementById('sortBtn');
    const inputsContainer = document.getElementById('inputsContainer');
    const sortedDisplaySpan = document.getElementById('sortedDisplay');
    const errorMsgDiv = document.getElementById('errorMsg');
    const infoStatsSpan = document.getElementById('infoStats');
    
    // Limpiar mensajes de error
    function hideError() {
        errorMsgDiv.style.display = 'none';
        errorMsgDiv.textContent = '';
    }
    
    function showError(message) {
        errorMsgDiv.textContent = message;
        errorMsgDiv.style.display = 'block';
        // auto-ocultar despues de 4 segundos
        setTimeout(() => {
            if (errorMsgDiv.textContent === message) {
                errorMsgDiv.style.display = 'none';
            }
        }, 4000);
    }
    
    // Obtener el arreglo actual desde los inputs numericos
    function getCurrentArrayFromInputs() {
        const inputElements = document.querySelectorAll('.array-elem-input');
        if (inputElements.length === 0) {
            return { error: true, message: "No hay campos definidos. Presione 'GENERAR CAMPOS' primero." };
        }
        
        const values = [];
        for (let inp of inputElements) {
            let raw = inp.value.trim();
            if (raw === "") {
                return { error: true, message: "Existen campos vacios. Complete todos los valores." };
            }
            let num = Number(raw);
            if (isNaN(num)) {
                return { error: true, message: `Valor no numerico: "${raw}"` };
            }
            if (!Number.isInteger(num)) {
                return { error: true, message: `El numero ${num} debe ser entero.` };
            }
            if (num < 0) {
                return { error: true, message: `Valor negativo: ${num}. Counting Sort solo acepta >=0` };
            }
            values.push(num);
        }
        return { error: false, array: values };
    }
    
    // Actualizar la UI con el arreglo ordenado
    function updateSortedDisplay() {
        hideError();
        const result = getCurrentArrayFromInputs();
        if (result.error) {
            showError(result.message);
            sortedDisplaySpan.innerHTML = "[ error en datos ]";
            infoStatsSpan.innerHTML = "Corrija los valores e intente nuevamente.";
            return;
        }
        
        const originalArray = result.array;
        if (originalArray.length === 0) {
            sortedDisplaySpan.innerHTML = "[ arreglo vacio ]";
            infoStatsSpan.innerHTML = "No hay elementos para ordenar.";
            return;
        }
        
        try {
            const sortedArray = countingSortAlgorithm(originalArray);
            const maxOriginal = Math.max(...originalArray);
            const minOriginal = Math.min(...originalArray);
            // mostrar representacion clara
            const originalStr = originalArray.join(", ");
            const sortedStr = sortedArray.join(", ");
            sortedDisplaySpan.innerHTML = `ORIGINAL: [ ${originalStr} ]<br>ORDENADO: [ ${sortedStr} ]`;
            infoStatsSpan.innerHTML = `Rango maximo: ${maxOriginal} | Minimo: ${minOriginal} | Total elementos: ${originalArray.length} | Tamaño conteo: ${maxOriginal+1}`;
        } catch (err) {
            showError(err.message);
            sortedDisplaySpan.innerHTML = "[ error en ordenamiento ]";
            infoStatsSpan.innerHTML = "Verifique que todos los valores sean enteros no negativos.";
        }
    }
    
    // Generar los campos input segun el tamaño actual (sin redondeos)
    function generateInputFields(size, fillWithRandom = true) {
        if (!size || size < 1) size = 1;
        let maxAllowed = 38;
        if (size > maxAllowed) {
            showError(`Maximo permitido: ${maxAllowed} elementos por rendimiento visual.`);
            size = maxAllowed;
            sizeInput.value = maxAllowed;
        }
        
        inputsContainer.innerHTML = '';
        for (let i = 0; i < size; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'input-item';
            const indexSpan = document.createElement('span');
            indexSpan.textContent = `${i+1}`;
            const inputElem = document.createElement('input');
            inputElem.type = 'number';
            inputElem.step = '1';
            inputElem.min = '0';
            // valor por defecto: si fillWithRandom true -> aleatorio 0-99, si no 0
            let defaultValue = 0;
            if (fillWithRandom) {
                defaultValue = Math.floor(Math.random() * 100);
            }
            inputElem.value = defaultValue;
            inputElem.className = 'array-elem-input';
            wrapper.appendChild(indexSpan);
            wrapper.appendChild(inputElem);
            inputsContainer.appendChild(wrapper);
        }
        // Mostrar en infoStats feedback
        infoStatsSpan.innerHTML = `Campos generados: ${size} elementos. Edite o use aleatorios.`;
        sortedDisplaySpan.innerHTML = "[ sin ordenar ]";
        hideError();
    }
    
    // Llenar todos los inputs actuales con valores aleatorios (0 a 99)
    function fillWithRandomValues() {
        const inputs = document.querySelectorAll('.array-elem-input');
        if (inputs.length === 0) {
            showError("Primero genere los campos (Boton GENERAR CAMPOS)");
            return false;
        }
        for (let inp of inputs) {
            let randomVal = Math.floor(Math.random() * 100);
            inp.value = randomVal;
        }
        hideError();
        sortedDisplaySpan.innerHTML = "[ se aplicaron valores aleatorios, presione ORDENAR ]";
        infoStatsSpan.innerHTML = `Valores aleatorios asignados (0-99). Total elementos: ${inputs.length}`;
        return true;
    }
    
    // Eventos principales
    createBtn.addEventListener('click', () => {
        let newSize = parseInt(sizeInput.value, 10);
        if (isNaN(newSize) || newSize < 1) {
            showError("Cantidad invalida. Debe ser un numero mayor a 0.");
            newSize = 5;
            sizeInput.value = 5;
        }
        generateInputFields(newSize, true);   // true -> rellena con aleatorios agradables
    });
    
    randomizeBtn.addEventListener('click', () => {
        fillWithRandomValues();
    });
    
    sortBtn.addEventListener('click', () => {
        updateSortedDisplay();
    });
    
    // Inicializar por defecto: 7 elementos con valores aleatorios.
    function init() {
        const defaultSize = 7;
        sizeInput.value = defaultSize;
        generateInputFields(defaultSize, true);
        // opcional: mostrar mensaje de bienvenida
        infoStatsSpan.innerHTML = `Listo. Arreglo inicial de ${defaultSize} elementos aleatorios (0-99).`;
        sortedDisplaySpan.innerHTML = "[ esperando ordenar ]";
    }
    
    // Si se presiona Enter en tamaño, regenerar campos
    sizeInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            createBtn.click();
        }
    });
    
    init();
</script>
</body>
</html>

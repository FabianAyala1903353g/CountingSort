<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Counting Sort | Algoritmo de ordenamiento</title>
    <!-- Fuentes personalizadas -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: white;
            font-family: 'Fira Code', 'JetBrains Mono', 'Courier New', monospace;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #7918A1;
            padding: 1.2rem 2rem;
            border-bottom: 3px solid black;
        }

        .header h1 {
            color: white;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin: 0;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
        }

        .header p {
            color: #f0e6f5;
            margin-top: 0.4rem;
            font-size: 1rem;
            font-weight: 500;
            font-family: 'Fira Code', monospace;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: white;
        }

        .control-panel {
            background: white;
            border-bottom: 2px solid black;
            padding: 1.5rem 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: flex-end;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: white;
        }

        .control-group label {
            font-size: 0.8rem;
            font-weight: 700;
            color: black;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
        }

        input, button {
            border: 2px solid black;
            background: white;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            font-size: 1rem;
            padding: 0.6rem 1.2rem;
            transition: all 0.1s ease;
            outline: none;
            color: black;
            font-weight: 700;
            border-radius: 0px;
        }

        input:focus {
            border-color: #7918A1;
            background: #faf5ff;
        }

        button {
            background: black;
            color: white;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 2px solid black;
        }

        button:hover {
            background: #7918A1;
            border-color: #7918A1;
            color: white;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-outline {
            background: white;
            color: black;
            border: 2px solid black;
        }

        .btn-outline:hover {
            background: #7918A1;
            color: white;
            border-color: #7918A1;
        }

        .array-section {
            background: white;
            padding: 1.2rem 2rem;
            border-bottom: 1px solid #e0e0e0;
            flex-shrink: 0;
        }

        .array-title {
            font-weight: 800;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            color: black;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-left: 4px solid #7918A1;
            padding-left: 12px;
        }

        .inputs-wrapper {
            max-height: 280px;
            overflow-y: auto;
            background: #fefefe;
            border: 1px solid black;
            padding: 1rem;
        }

        .inputs-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .input-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            border: 1px solid black;
            padding: 6px 10px 6px 14px;
        }

        .input-item span {
            font-weight: 800;
            font-size: 0.9rem;
            color: #7918A1;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            min-width: 30px;
        }

        /* NUMEROS MAS GRANDES Y NEGRITA */
        .input-item input {
            width: 95px;
            padding: 0.55rem 0.5rem;
            font-size: 1.05rem;
            border: 1px solid black;
            text-align: center;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            font-weight: 800;
            color: black;
            letter-spacing: 0.5px;
        }

        .result-section {
            flex: 1;
            padding: 1.5rem 2rem;
            background: white;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .result-box {
            background: #f8f8f8;
            border: 2px solid black;
            padding: 1.2rem;
            width: 100%;
        }

        .result-header {
            font-weight: 800;
            font-size: 1rem;
            margin-bottom: 0.8rem;
            color: black;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            text-transform: uppercase;
            border-bottom: 2px solid #7918A1;
            display: inline-block;
            padding-bottom: 5px;
        }

        .sorted-content {
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            font-size: 1.05rem;
            background: white;
            border: 1px solid #ccc;
            padding: 1rem;
            word-break: break-word;
            white-space: pre-wrap;
            line-height: 1.6;
            color: black;
            font-weight: 800;
            letter-spacing: 0.3px;
        }

        .error-message {
            background: black;
            color: white;
            padding: 0.8rem;
            margin-top: 0.8rem;
            font-family: 'Fira Code', monospace;
            border-left: 5px solid #7918A1;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .info-stats {
            margin-top: 0.8rem;
            font-size: 0.8rem;
            font-family: 'Fira Code', monospace;
            color: #444;
            border-top: 1px solid #ddd;
            padding-top: 0.6rem;
            font-weight: 600;
        }

        .inputs-wrapper::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .inputs-wrapper::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-left: 1px solid #ccc;
        }
        .inputs-wrapper::-webkit-scrollbar-thumb {
            background: #7918A1;
            border-radius: 0px;
        }

        .initial-message {
            text-align: center;
            padding: 2rem;
            color: #666;
            font-family: 'Fira Code', monospace;
            font-size: 1rem;
            border: 1px dashed black;
            background: #fafafa;
            width: 100%;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="header">
    <h1>COUNTING SORT ALGORITHM</h1>
    <p>Ordenamiento lineal por conteo | Solo enteros positivos (1 a 500)</p>
</div>

<div class="main-content">
    <div class="control-panel">
        <div class="control-group">
            <label>CANTIDAD DE ELEMENTOS</label>
            <input type="number" id="arraySizeInput" min="1" max="100" value="10" step="1">
        </div>
        <div class="control-group">
            <label>&nbsp;</label>
            <button id="createArrayBtn">GENERAR ARREGLO</button>
        </div>
        <div class="control-group">
            <label>&nbsp;</label>
            <button id="randomizeBtn" class="btn-outline">VALORES ALEATORIOS</button>
        </div>
        <div class="control-group">
            <label>&nbsp;</label>
            <button id="sortBtn">ORDENAR (COUNTING SORT)</button>
        </div>
    </div>

    <div class="array-section" id="arraySection">
        <div class="array-title">ARREGLO DE ENTEROS (1 a 500)</div>
        <div class="inputs-wrapper">
            <div id="inputsContainer" class="inputs-grid">
                <div class="initial-message">Configure la cantidad y presione "GENERAR ARREGLO"</div>
            </div>
        </div>
    </div>

    <div class="result-section" id="resultSection">
        <div class="result-box">
            <div class="result-header">RESULTADO DEL ORDENAMIENTO</div>
            <div id="sortedDisplay" class="sorted-content">[ sin datos ]</div>
            <div id="errorMsg" class="error-message" style="display: none;"></div>
            <div id="infoStats" class="info-stats">Esperando generacion del arreglo...</div>
        </div>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // IMPLEMENTACION DEL ALGORITMO COUNTING SORT
    // --------------------------------------------------------------
    function countingSortAlgorithm(arr) {
        if (!Array.isArray(arr)) throw new Error("El arreglo no es valido");
        if (arr.length === 0) return [];
        
        for (let i = 0; i < arr.length; i++) {
            if (!Number.isInteger(arr[i])) {
                throw new Error(`Elemento '${arr[i]}' no es un entero.`);
            }
            if (arr[i] < 1) {
                throw new Error(`Counting Sort requiere valores >= 1. Valor invalido: ${arr[i]}`);
            }
            if (arr[i] > 500) {
                throw new Error(`Valor maximo permitido es 500. Valor encontrado: ${arr[i]}`);
            }
        }
        
        let maxValue = arr[0];
        for (let i = 1; i < arr.length; i++) {
            if (arr[i] > maxValue) maxValue = arr[i];
        }
        
        let countArray = new Array(maxValue + 1).fill(0);
        
        for (let i = 0; i < arr.length; i++) {
            countArray[arr[i]]++;
        }
        
        let sortedResult = [];
        for (let value = 1; value <= maxValue; value++) {
            while (countArray[value] > 0) {
                sortedResult.push(value);
                countArray[value]--;
            }
        }
        return sortedResult;
    }
    
    // --------------------------------------------------------------
    // DOM ELEMENTS
    // --------------------------------------------------------------
    const sizeInput = document.getElementById('arraySizeInput');
    const createBtn = document.getElementById('createArrayBtn');
    const randomizeBtn = document.getElementById('randomizeBtn');
    const sortBtn = document.getElementById('sortBtn');
    const inputsContainer = document.getElementById('inputsContainer');
    const sortedDisplaySpan = document.getElementById('sortedDisplay');
    const errorMsgDiv = document.getElementById('errorMsg');
    const infoStatsSpan = document.getElementById('infoStats');
    const arraySection = document.getElementById('arraySection');
    const resultSection = document.getElementById('resultSection');
    
    function hideError() {
        errorMsgDiv.style.display = 'none';
        errorMsgDiv.textContent = '';
    }
    
    function showError(message) {
        errorMsgDiv.textContent = message;
        errorMsgDiv.style.display = 'block';
        setTimeout(() => {
            if (errorMsgDiv.textContent === message) {
                errorMsgDiv.style.display = 'none';
            }
        }, 4500);
    }
    
    function getCurrentArrayFromInputs() {
        const inputElements = document.querySelectorAll('.array-elem-input');
        if (inputElements.length === 0) {
            return { error: true, message: "No hay campos. Presione 'GENERAR ARREGLO' primero." };
        }
        
        const values = [];
        for (let inp of inputElements) {
            let raw = inp.value.trim();
            if (raw === "") {
                return { error: true, message: "Existen campos vacios. Complete todos los valores." };
            }
            let num = Number(raw);
            if (isNaN(num)) {
                return { error: true, message: `Valor no numerico: "${raw}"` };
            }
            if (!Number.isInteger(num)) {
                return { error: true, message: `El numero ${num} debe ser entero.` };
            }
            if (num < 1) {
                return { error: true, message: `Valor invalido: ${num}. Los numeros deben ser desde 1 hasta 500.` };
            }
            if (num > 500) {
                return { error: true, message: `Valor ${num} excede el maximo permitido (500).` };
            }
            values.push(num);
        }
        return { error: false, array: values };
    }
    
    function updateSortedDisplay() {
        hideError();
        const result = getCurrentArrayFromInputs();
        if (result.error) {
            showError(result.message);
            sortedDisplaySpan.innerHTML = "[ error en datos ]";
            infoStatsSpan.innerHTML = "Corrija los valores (rango 1-500) y vuelva a intentar.";
            return;
        }
        
        const originalArray = result.array;
        if (originalArray.length === 0) {
            sortedDisplaySpan.innerHTML = "[ arreglo vacio ]";
            infoStatsSpan.innerHTML = "No hay elementos para ordenar.";
            return;
        }
        
        try {
            const sortedArray = countingSortAlgorithm(originalArray);
            const maxOriginal = Math.max(...originalArray);
            const minOriginal = Math.min(...originalArray);
            const originalStr = originalArray.join(", ");
            const sortedStr = sortedArray.join(", ");
            sortedDisplaySpan.innerHTML = `ORIGINAL: [ ${originalStr} ]<br>ORDENADO: [ ${sortedStr} ]`;
            infoStatsSpan.innerHTML = `Rango: min=${minOriginal} | max=${maxOriginal} | Elementos: ${originalArray.length} | Tamano conteo: ${maxOriginal+1}`;
        } catch (err) {
            showError(err.message);
            sortedDisplaySpan.innerHTML = "[ error en ordenamiento ]";
            infoStatsSpan.innerHTML = "Verifique que todos los valores sean enteros entre 1 y 500.";
        }
    }
    
    function generateInputFields(size, fillWithRandom = true) {
        if (!size || size < 1) size = 1;
        const maxAllowed = 100;
        let finalSize = size;
        if (finalSize > maxAllowed) {
            showError(`Maximo permitido: ${maxAllowed} elementos.`);
            finalSize = maxAllowed;
            sizeInput.value = maxAllowed;
        }
        
        inputsContainer.innerHTML = '';
        for (let i = 0; i < finalSize; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'input-item';
            const indexSpan = document.createElement('span');
            indexSpan.textContent = `${i+1}`;
            const inputElem = document.createElement('input');
            inputElem.type = 'number';
            inputElem.step = '1';
            inputElem.min = '1';
            inputElem.max = '500';
            
            let defaultValue = 1;
            if (fillWithRandom) {
                defaultValue = Math.floor(Math.random() * 500) + 1;
            }
            inputElem.value = defaultValue;
            inputElem.className = 'array-elem-input';
            wrapper.appendChild(indexSpan);
            wrapper.appendChild(inputElem);
            inputsContainer.appendChild(wrapper);
        }
        
        arraySection.style.display = 'block';
        resultSection.style.display = 'flex';
        
        infoStatsSpan.innerHTML = `Arreglo generado: ${finalSize} elementos (rango 1-500). Puede editar o usar aleatorios.`;
        sortedDisplaySpan.innerHTML = "[ sin ordenar ]";
        hideError();
    }
    
    function fillWithRandomValues() {
        const inputs = document.querySelectorAll('.array-elem-input');
        if (inputs.length === 0) {
            showError("Primero genere el arreglo (Boton GENERAR ARREGLO)");
            return false;
        }
        for (let inp of inputs) {
            let randomVal = Math.floor(Math.random() * 500) + 1;
            inp.value = randomVal;
        }
        hideError();
        sortedDisplaySpan.innerHTML = "[ valores aleatorios asignados, presione ORDENAR ]";
        infoStatsSpan.innerHTML = `Nuevos valores aleatorios (1-500). Total elementos: ${inputs.length}`;
        return true;
    }
    
    // Eventos
    createBtn.addEventListener('click', () => {
        let newSize = parseInt(sizeInput.value, 10);
        if (isNaN(newSize) || newSize < 1) {
            showError("Cantidad invalida. Debe ser un numero entre 1 y 100.");
            newSize = 5;
            sizeInput.value = 5;
        }
        if (newSize > 100) {
            showError("Maximo 100 elementos permitidos.");
            newSize = 100;
            sizeInput.value = 100;
        }
        generateInputFields(newSize, true);
    });
    
    randomizeBtn.addEventListener('click', () => {
        fillWithRandomValues();
    });
    
    sortBtn.addEventListener('click', () => {
        const inputElements = document.querySelectorAll('.array-elem-input');
        if (inputElements.length === 0) {
            showError("No hay arreglo generado. Presione 'GENERAR ARREGLO' primero.");
            return;
        }
        updateSortedDisplay();
    });
    
    sizeInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            createBtn.click();
        }
    });
    
    // Inicializacion
    function init() {
        inputsContainer.innerHTML = '<div class="initial-message">Configure la cantidad de elementos y presione "GENERAR ARREGLO"</div>';
        arraySection.style.display = 'block';
        resultSection.style.display = 'flex';
        sortedDisplaySpan.innerHTML = "[ sin datos ]";
        infoStatsSpan.innerHTML = "Presione 'GENERAR ARREGLO' para comenzar.";
        hideError();
    }
    
    init();
</script>
</body>
</html>
